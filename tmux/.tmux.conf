# ---------------------------------------------------------------------------
# General
# ---------------------------------------------------------------------------
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"  # true color

set -g history-limit 50000
set -g mouse on
set -g base-index 1           # windows start at 1
setw -g pane-base-index 1
set -g renumber-windows on
set -s escape-time 0          # no delay for ESC in vim
set -g focus-events on

# ---------------------------------------------------------------------------
# Prefix: Ctrl-a (ergonomic alternative to Ctrl-b)
# ---------------------------------------------------------------------------
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ---------------------------------------------------------------------------
# Key bindings
# ---------------------------------------------------------------------------
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Split with | and -  (stay in current path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# New window in current path
bind c new-window -c "#{pane_current_path}"

# ---------------------------------------------------------------------------
# Copy mode (vi)
# ---------------------------------------------------------------------------
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# ---------------------------------------------------------------------------
# Status bar
# ---------------------------------------------------------------------------
set -g status-position top
set -g status-interval 5
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

set -g status-left-length 40
set -g status-left "#[fg=#89b4fa,bold]  #S #[fg=#585b70]│ "

set -g status-right-length 60
set -g status-right "#[fg=#585b70]│ #[fg=#a6e3a1]#{?#{==:#{pane_current_command},ssh},  ,} #[fg=#cdd6f4]%H:%M #[fg=#585b70]│ #[fg=#89dceb]%d %b"

setw -g window-status-format " #I:#W "
setw -g window-status-current-format "#[fg=#1e1e2e,bg=#89b4fa,bold] #I:#W "
setw -g window-status-style "fg=#585b70"
