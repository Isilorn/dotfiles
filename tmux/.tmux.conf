# ---------------------------------------------------------------------------
# General
# ---------------------------------------------------------------------------
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"  # true color

set -g history-limit 50000
set -g mouse on
set -g set-titles on
set -g set-titles-string "#{pane_current_command} — #{pane_current_path}"
set -g base-index 1           # windows start at 1
setw -g pane-base-index 1
set -g renumber-windows on
set -s escape-time 0          # no delay for ESC in vim
set -g focus-events on

# ---------------------------------------------------------------------------
# Prefix: Ctrl-a (ergonomic alternative to Ctrl-b)
# ---------------------------------------------------------------------------
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ---------------------------------------------------------------------------
# Key bindings
# ---------------------------------------------------------------------------
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Split with | and -  (stay in current path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# New window in current path
bind c new-window -c "#{pane_current_path}"

# ---------------------------------------------------------------------------
# Copy mode (vi)
# ---------------------------------------------------------------------------
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# ---------------------------------------------------------------------------
# Status bar — couleurs ANSI uniquement, héritées de la palette WezTerm
# ---------------------------------------------------------------------------
set -g status-position top
set -g status-interval 5
set -g status-style "bg=default,fg=default"

set -g status-left-length 40
set -g status-left "#[fg=blue,bold]  #S #[fg=brightblack,nobold]│ "

set -g status-right-length 60
set -g status-right "#[fg=brightblack]│ #[fg=green]#{?#{==:#{pane_current_command},ssh},  ,}#[fg=default]%H:%M #[fg=brightblack]│ #[fg=cyan]%d %b"

setw -g window-status-format " #I:#W "
setw -g window-status-current-format "#[fg=white,bg=blue,bold] #I:#W "
setw -g window-status-style "fg=white"
