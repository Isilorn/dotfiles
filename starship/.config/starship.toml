"$schema" = 'https://starship.rs/config-schema.json'

# Only listed modules run вЂ” all language modules are implicitly off.
format = """
$username$hostname$directory$git_branch$git_status$sudo$jobs$cmd_duration$status$line_break$character"""

command_timeout = 500   # ms вЂ” Г©vite les ralentissements sur NFS/SSHFS

# ---------------------------------------------------------------------------
# IdentitГ© вЂ” toujours visible (sysadmin sur plusieurs machines)
# ---------------------------------------------------------------------------
[username]
show_always = true
format    = "[$user]($style)@"
style_user = "bold cyan"
style_root = "bold red"      # rouge si root, inratable

[hostname]
ssh_only = false
format   = "[$hostname]($style) "
style    = "bold cyan"
trim_at  = "."               # bluemoon.local в†’ bluemoon

# ---------------------------------------------------------------------------
# Navigation
# ---------------------------------------------------------------------------
[directory]
format            = "[$path]($style)[$read_only]($read_only_style) "
style             = "bold blue"
truncation_length = 4
truncate_to_repo  = false    # pas de comportement "magique" dans les repos
read_only         = " ro"
read_only_style   = "red"

# ---------------------------------------------------------------------------
# Git вЂ” apparaГ®t uniquement dans un repo
# ---------------------------------------------------------------------------
[git_branch]
format = "[$symbol$branch]($style) "
symbol = "on "
style  = "bold purple"

[git_status]
format     = '([\[$all_status$ahead_behind\]]($style) )'
style      = "bold yellow"
ahead      = "в‡Ў${count}"
behind     = "в‡Ј${count}"
diverged   = "в‡•в‡Ў${ahead_count}в‡Ј${behind_count}"
modified   = "!${count}"
staged     = "+${count}"
untracked  = "?${count}"
deleted    = "-${count}"
stashed    = "в‰Ў"

# ---------------------------------------------------------------------------
# Infos systГЁme utiles en sysadmin
# ---------------------------------------------------------------------------
[sudo]
disabled = false
format   = "[sudo]($style) "
style    = "bold red"
symbol   = ""

[jobs]
format  = "[$symbol$number]($style) "
style   = "bold yellow"
symbol  = "в‡Ў"               # jobs en background
threshold = 1

[cmd_duration]
min_time = 5_000             # affiche seulement si > 5s
format   = "[${duration}]($style) "
style    = "yellow"

[status]
disabled = false
format   = '[$symbol$status]($style) '
symbol   = "вњ— "
style    = "bold red"
success_symbol = ""          # rien si succГЁs, pas de bruit

# ---------------------------------------------------------------------------
# Prompt final
# ---------------------------------------------------------------------------
[character]
success_symbol = "[вќЇ](bold green)"
error_symbol   = "[вќЇ](bold red)"
