"$schema" = 'https://starship.rs/config-schema.json'

# Only listed modules run ‚Äî all language modules are implicitly off.
format = """
$username$hostname$directory$git_branch$git_status$sudo$jobs$cmd_duration$status$line_break$character"""

command_timeout = 500   # ms ‚Äî avoids slowdowns on NFS/SSHFS

# ---------------------------------------------------------------------------
# Identity ‚Äî always visible (sysadmin across multiple machines)
# ---------------------------------------------------------------------------
[username]
show_always = true
format    = "[$user]($style)@"
style_user = "bold cyan"
style_root = "bold red"      # red when root ‚Äî hard to miss

[hostname]
ssh_only = false
format   = "[$hostname]($style) "
style    = "bold cyan"
trim_at  = "."               # strip domain suffix: bluemoon.local ‚Üí bluemoon

# ---------------------------------------------------------------------------
# Navigation
# ---------------------------------------------------------------------------
[directory]
format            = "[$path]($style)[$read_only]($read_only_style) "
style             = "bold blue"
truncation_length = 4
truncate_to_repo  = false    # no magic truncation inside repos
read_only         = " "
read_only_style   = "red"

# ---------------------------------------------------------------------------
# Git ‚Äî shown only inside a repo
# ---------------------------------------------------------------------------
[git_branch]
format = "[$symbol$branch]($style) "
symbol = " "
style  = "bold purple"

[git_status]
format     = '([\[$all_status$ahead_behind\]]($style) )'
style      = "bold yellow"
ahead      = "‚á°${count}"
behind     = "‚á£${count}"
diverged   = "‚áï‚á°${ahead_count}‚á£${behind_count}"
modified   = "!${count}"
staged     = "+${count}"
untracked  = "?${count}"
deleted    = "-${count}"
stashed    = "‚â°"

# ---------------------------------------------------------------------------
# Sysadmin-relevant system info
# ---------------------------------------------------------------------------
[sudo]
disabled = false
format   = "[$symbol]($style) "
style    = "bold red"
symbol   = " "

[jobs]
format    = "[$symbol$number]($style) "
style     = "bold yellow"
symbol    = " "
threshold = 1

[cmd_duration]
min_time = 5_000             # show only if command took more than 5s
format   = "[${duration}]($style) "
style    = "yellow"

[status]
disabled = false
format   = '[$symbol$status]($style) '
symbol   = "‚úó "
style    = "bold red"
success_symbol = ""          # nothing on success ‚Äî no noise

# ---------------------------------------------------------------------------
# Final prompt character
# ---------------------------------------------------------------------------
[character]
success_symbol = "[‚ùØ](bold green)"
error_symbol   = "[‚ùØ](bold red)"
