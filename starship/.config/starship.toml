"$schema" = 'https://starship.rs/config-schema.json'

# Only listed modules run ÔÇö all language modules are implicitly off.
format = """
$username$hostname$directory$git_branch$git_status$sudo$jobs$cmd_duration$status$line_break$character"""

command_timeout = 500   # ms ÔÇö ├®vite les ralentissements sur NFS/SSHFS

# ---------------------------------------------------------------------------
# Identit├® ÔÇö toujours visible (sysadmin sur plusieurs machines)
# ---------------------------------------------------------------------------
[username]
show_always = true
format    = "[$user]($style)@"
style_user = "bold cyan"
style_root = "bold red"      # rouge si root, inratable

[hostname]
ssh_only = false
format   = "[$hostname]($style) "
style    = "bold cyan"
trim_at  = "."               # bluemoon.local ÔåÆ bluemoon

# ---------------------------------------------------------------------------
# Navigation
# ---------------------------------------------------------------------------
[directory]
format            = "[$path]($style)[$read_only]($read_only_style) "
style             = "bold blue"
truncation_length = 4
truncate_to_repo  = false    # pas de comportement "magique" dans les repos
read_only         = " "
read_only_style   = "red"

# ---------------------------------------------------------------------------
# Git ÔÇö appara├«t uniquement dans un repo
# ---------------------------------------------------------------------------
[git_branch]
format = "[$symbol$branch]($style) "
symbol = " "
style  = "bold purple"

[git_status]
format     = '([\[$all_status$ahead_behind\]]($style) )'
style      = "bold yellow"
ahead      = "Ôçí${count}"
behind     = "Ôçú${count}"
diverged   = "ÔçòÔçí${ahead_count}Ôçú${behind_count}"
modified   = "!${count}"
staged     = "+${count}"
untracked  = "?${count}"
deleted    = "-${count}"
stashed    = "Ôëí"

# ---------------------------------------------------------------------------
# Infos syst├¿me utiles en sysadmin
# ---------------------------------------------------------------------------
[sudo]
disabled = false
format   = "[$symbol]($style) "
style    = "bold red"
symbol   = " "

[jobs]
format    = "[$symbol$number]($style) "
style     = "bold yellow"
symbol    = " "
threshold = 1

[cmd_duration]
min_time = 5_000             # affiche seulement si > 5s
format   = "[${duration}]($style) "
style    = "yellow"

[status]
disabled = false
format   = '[$symbol$status]($style) '
symbol   = "Ô£ù "
style    = "bold red"
success_symbol = ""          # rien si succ├¿s, pas de bruit

# ---------------------------------------------------------------------------
# Prompt final
# ---------------------------------------------------------------------------
[character]
success_symbol = "[ÔØ»](bold green)"
error_symbol   = "[ÔØ»](bold red)"
